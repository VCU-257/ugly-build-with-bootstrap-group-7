<!DOCTYPE html>
<html>
<head>
    <title>Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">App</a>
            <div>
                <a class="btn btn-outline-primary" href="login.html">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2>Your Groups</h2>

        <div class="row">

            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title"> Group 1</h5>
                        <p class="card-text">3 Members</p>
                        <a href="group-detail.html" class="btn btn-primary">View Group</a>
                    </div>
                </div>
            </div>

            <!-- Another group -->
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Group 2</h5>
                        <p class="card-text">4 Members</p>
                        <a href="group-detail.html" class="btn btn-primary">View Group</a>
                    </div>
                </div>
            </div>

        </div>

        <h3 class="mt-4">Create or Join Group</h3>

        <form>
            <div class="mb-3">
                <label class="form-label">Group Name</label>
                <input type="text" class="form-control">
            </div>

            <button class="btn btn-success">Create Group</button>
            <button class="btn btn-secondary">Join Group</button>
        </form>

    </div>
    <nav class="fixed-bottom bg-light d-flex border-top border-dark py-2">
        <div class="container-fluid d-flex justify-content-around px-0">
            
            <a href="groups.html" class="text-dark text-decoration-none bg-secondary bg-opacity-25 flex-fill d-flex flex-column justify-content-center align-items-center p-2 rounded mx-1">
                <i class="bi bi-people-fill fs-4"></i>
                <span class="small mt-1">Groups</span>
            </a>
            
            <a href="home.html" class="text-dark text-decoration-none flex-fill d-flex flex-column justify-content-center align-items-center p-2 rounded mx-1">
                <i class="bi bi-house-door fs-4"></i>
                <span class="small mt-1">Home</span>
            </a>

            <a href="account.html" class="text-dark text-decoration-none flex-fill d-flex flex-column justify-content-center align-items-center p-2 rounded mx-1">
                <i class="bi bi-person fs-4"></i>
                <span class="small mt-1">Account</span>
            </a>
            
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
