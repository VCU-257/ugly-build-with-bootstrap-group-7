<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Nav</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .bottom-nav {
            background-color: #e0e0e0; 
            height: 80px; 
        }
        
        .nav-item {
            color: #000;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .nav-item:hover {
            color: #000;
        }

        .nav-item.active {
            background-color: #c4c4c4; 
        }

        .nav-item i {
            font-size: 1.5rem;
            -webkit-text-stroke: 1px black; 
        }
    </style>
</head>
<body>

    <nav class="fixed-bottom bottom-nav d-flex border-top border-dark">
        
        <a href="groups.html" class="nav-item flex-fill d-flex flex-column justify-content-center align-items-center">
            <i class="bi bi-square"></i>
            <span class="small mt-1">Groups</span>
        </a>

        <a href="index.html" class="nav-item active flex-fill d-flex flex-column justify-content-center align-items-center">
            <i class="bi bi-square"></i>
            <span class="small mt-1">Home</span>
        </a>

        <a href="account.html" class="nav-item flex-fill d-flex flex-column justify-content-center align-items-center">
            <i class="bi bi-square"></i>
            <span class="small mt-1">Account</span>
        </a>

    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
